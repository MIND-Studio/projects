# Build the prod image on every `v*` tag (or manual run) and push it to GHCR.
# The infra repo pins the printed @sha256 digest in k8s/argocd/children/appset-apps.yaml.
#
#   git tag v0.1.0 && git push --tags    (or: gh workflow run release.yml)
#
# GHCR auth + the @mind-studio/* package install both use GITHUB_TOKEN.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref to build (tag or branch)"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: notes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SOLID_ISSUER=https://pods.mindpods.org/
            NEXT_PUBLIC_POD_BASE_URL=https://pods.mindpods.org/
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

      - name: Emit digest-pinned image ref
        run: |
          IMAGE_LC="$(echo "${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          REF="${IMAGE_LC}@${{ steps.push.outputs.digest }}"
          echo "Pinned image: ${REF}"
          {
            echo "### ${IMAGE_NAME} image"
            echo '```'
            echo "${REF}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
